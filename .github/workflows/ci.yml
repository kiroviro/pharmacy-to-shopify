name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install ".[dev]"
      - run: python -m pytest tests/ -v --tb=short
      - name: Coverage report
        if: matrix.python-version == '3.11'
        run: python -m pytest tests/ --cov=src --cov-report=term-missing

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install detect-secrets
      - run: detect-secrets scan --baseline .secrets.baseline
      - name: Check for new secrets (ignore timestamp)
        run: |
          python3 -c "
          import json, subprocess, sys
          with open('.secrets.baseline') as f:
              new = json.load(f)
          result = subprocess.run(['git', 'show', 'HEAD:.secrets.baseline'], capture_output=True, text=True)
          old = json.loads(result.stdout)
          new['generated_at'] = old['generated_at']
          with open('.secrets.baseline', 'w') as f:
              json.dump(new, f, indent=2)
              f.write('\n')
          "
          git diff --exit-code .secrets.baseline
